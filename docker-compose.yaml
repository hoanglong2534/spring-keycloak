
networks:
  my-network:
    driver: bridge

services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z

    ports:
      - 9000:9000
      - 9001:9001
    environment:
      - MINIO_ROOT_USER=longpxh
      - MINIO_ROOT_PASSWORD=longpxh@123
    command: minio server /data --console-address ":9001"
    volumes:
        - ./minio-data:/data
    restart: always
    networks:
        - my-network

