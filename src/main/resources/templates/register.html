<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Basic Auth - Register</title>
</head>

<body>

    <div id="registerSection">
        <h2>Register</h2>
        <input type="text" id="regUser" placeholder="Username"><br><br>
        <input type="email" id="regEmail" placeholder="Email"><br><br>
        <input type="text" id="regFirst" placeholder="First Name"><br><br>
        <input type="text" id="regLast" placeholder="Last Name"><br><br>
        <input type="password" id="regPass" placeholder="Password"><br><br>
        <button onclick="register()">Register</button>
        <button onclick="window.location.href='/login'">Back to Login</button>
        <p id="regMsg"></p>
    </div>

    <script>
        async function register() {
            const msg = document.getElementById('regMsg');
            const payload = {
                username: document.getElementById('regUser').value,
                email: document.getElementById('regEmail').value,
                firstName: document.getElementById('regFirst').value,
                lastName: document.getElementById('regLast').value,
                password: document.getElementById('regPass').value
            };
            try {
                const res = await fetch('/users/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error("Register failed");
                msg.innerText = "Register success! Please login.";
                msg.style.color = "green";
            } catch (e) {
                msg.innerText = e.message;
                msg.style.color = "red";
            }
        }
    </script>

</body>

</html>
